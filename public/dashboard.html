<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talent Portal - Orland Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Poppins', 'sans-serif'] }, colors: { primary: '#6b8aed', secondary: '#f3f4f6' } } } }</script>
  <style>
      body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; overflow: hidden; }
      /* Efek loading memudar */
      .fade-in { animation: fadeIn 0.4s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .nav-item.active { background-color: #eff6ff; color: #6b8aed; border-right: 4px solid #6b8aed; font-weight: 600; }
  </style>
</head>
<body class="text-gray-800 h-screen flex">

  <div id="loading-screen" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300">
      <i class="fa-solid fa-circle-notch fa-spin text-5xl text-primary mb-4"></i>
      <h2 class="text-xl font-semibold text-gray-700">Memuat Ruang Kerja...</h2>
  </div>

  <aside class="w-64 bg-white shadow-xl h-full flex flex-col hidden md:flex z-20">
      <div class="h-20 flex items-center justify-center border-b border-gray-100">
          <h1 class="text-2xl font-bold text-primary tracking-wider">TALENT<span class="text-gray-800">HUB</span></h1>
      </div>
      
      <nav class="flex-1 overflow-y-auto py-4">
          <ul class="space-y-1" id="nav-menu">
              <li><a href="#" onclick="loadModule('dashboard', this)" class="nav-item active flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-house w-6"></i> Dashboard</a></li>
              <li><a href="#" onclick="loadModule('profile', this)" class="nav-item flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-user w-6"></i> Profil & Portofolio</a></li>
              <li><a href="#" onclick="loadModule('projects', this)" class="nav-item flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-briefcase w-6"></i> Proyek Saya</a></li>
              <li><a href="#" onclick="loadModule('notifications', this)" class="nav-item flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-bell w-6"></i> Notifikasi</a></li>
              <li><a href="#" onclick="loadModule('certificates', this)" class="nav-item flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-award w-6"></i> Sertifikat</a></li>
              <li><a href="#" onclick="loadModule('comcard_maker', this)" class="nav-item flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-object-group w-6"></i> Comcard Maker</a></li>
              <li><a href="#" onclick="loadModule('wallet', this)" class="nav-item flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 transition-colors"><i class="fa-solid fa-sack-dollar w-6"></i> Dompet Poin</a></li>
          </ul>
      </nav>

      <div class="p-4 border-t border-gray-100">
          <button onclick="window.doLogout()" class="w-full flex items-center justify-center gap-2 bg-red-50 text-red-500 py-2 rounded-lg font-semibold hover:bg-red-100 transition-colors">
              <i class="fa-solid fa-right-from-bracket"></i> Keluar
          </button>
      </div>
  </aside>

  <main class="flex-1 flex flex-col h-full overflow-hidden relative">
      
      <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 z-10">
          <div class="flex items-center gap-4">
              <button class="md:hidden text-gray-500 hover:text-primary text-xl"><i class="fa-solid fa-bars"></i></button>
              <h2 id="page-title" class="text-xl font-semibold text-gray-800 hidden sm:block">Ringkasan</h2>
          </div>
          
          <div class="flex items-center gap-4">
              <div class="text-right hidden sm:block">
                  <p id="user-name" class="text-sm font-bold text-gray-800 leading-none">Memuat...</p>
                  <p class="text-xs text-green-500 font-medium">Talent Aktif</p>
              </div>
              <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold shadow-md cursor-pointer">
                  <i class="fa-solid fa-user-astronaut"></i>
              </div>
          </div>
      </header>

      <div id="app-content" class="flex-1 overflow-y-auto p-8 fade-in">
          <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
              <h3 class="text-2xl font-bold mb-2">Selamat Datang di Talent Hub!</h3>
              <p class="text-gray-500">Pilih menu di sebelah kiri untuk mulai mengelola profil dan proyek Anda.</p>
          </div>
      </div>
      
      <button onclick="window.toggleChat()" class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-white rounded-full shadow-[0_10px_25px_rgba(107,138,237,0.5)] flex items-center justify-center text-2xl hover:scale-110 transition-transform z-50 group">
          <i class="fa-solid fa-comment-dots"></i>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm">1</span>
      </button>

      
      <button onclick="window.toggleChat()" class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-white rounded-full shadow-[0_10px_25px_rgba(107,138,237,0.5)] flex items-center justify-center text-2xl hover:scale-110 transition-transform z-50 group">
          <i class="fa-solid fa-comment-dots"></i>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-sm">1</span>
      </button>

  </main>

<script type="module">
// MENGGUNAKAN FILE AUTH TERBARU KITA
import { requireAuth, logout } from "/assets/js/auth.js";
import { state } from "/assets/js/state.js"; // Memastikan kita bisa menyuntik data

// Jadikan fungsi global agar bisa dipanggil dari HTML (onclick)
window.doLogout = logout;
window.toggleChat = function() {
    // Import notify dinamis untuk menampilkan pesan coming soon
    import("/assets/js/notify.js").then(m => m.notify("Fitur Chat Room sedang dalam tahap analisa & pengembangan!", "info"));
}
window.toggleChat = function() {
    // Import notify dinamis untuk menampilkan pesan coming soon
    import("/assets/js/notify.js").then(m => m.notify("Fitur Chat Room sedang dalam tahap analisa & pengembangan!", "info"));
}

// Fungsi Router Sederhana untuk memuat modul
window.loadModule = async function(moduleName, element) {
    // Update UI Menu Aktif
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    if(element) element.classList.add('active');
    
    // Update Judul Halaman
    const titles = { 'dashboard': 'Ringkasan', 'profile': 'Profil & Portofolio', 'projects': 'Proyek Saya', 'notifications': 'Notifikasi' };
    document.getElementById('page-title').innerText = titles[moduleName] || 'Talent Hub';

    const contentArea = document.getElementById('app-content');
    contentArea.innerHTML = `<div class="flex justify-center items-center h-64"><i class="fa-solid fa-spinner fa-spin text-3xl text-primary"></i></div>`;

    try {
        // Dinamis import modul JS sesuai menu yang diklik
        const module = await import(`/modules/mod_${moduleName}.js`);
        
        // Asumsi: Setiap file mod_xxx.js punya fungsi render()
        if (module && module.render) {
            contentArea.innerHTML = await module.render();
            // Jika ada event listener tambahan di dalam modul
            if (module.initEvents) module.initEvents(); 
        } else {
            contentArea.innerHTML = `<div class="bg-red-50 text-red-500 p-4 rounded-xl">Modul tidak memiliki fungsi render().</div>`;
        }
    } catch (e) {
        console.error("Gagal memuat modul:", e);
        contentArea.innerHTML = `
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center">
                <i class="fa-solid fa-hammer text-5xl text-gray-300 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">Modul Sedang Dibangun</h3>
                <p class="text-gray-500">Fitur ${moduleName} ini sedang dalam tahap pengembangan.</p>
            </div>
        `;
    }
}

// Inisialisasi Aplikasi
async function init() {
  // PENGAMANAN KETAT: Memanggil "Satpam" kita. Jika gagal, halaman tidak akan merender.
  // Parameter 'talent' memastikan client tidak bisa masuk ke sini.
  const user = await requireAuth('talent'); 
  
  if (user) {
    // 1. Tampilkan Nama User
    document.getElementById("user-name").innerText = user.full_name || user.email;
    
    // 2. Simpan user ke state agar bisa dibaca oleh modul-modul lain
    state.user = user;

    // 3. Hilangkan layar loading
    setTimeout(() => {
        const loader = document.getElementById('loading-screen');
        loader.style.opacity = '0';
        setTimeout(() => loader.remove(), 300);
        
        // 4. Muat modul default (Dashboard)
        // INTERCEPTOR DEEP LINK: Cek apakah user baru saja datang dari link WhatsApp
        const pendingProject = localStorage.getItem('pending_apply_project');
        if (pendingProject) {
            // Jangan load dashboard, langsung load modul proyek
            window.loadModule('projects', document.querySelector('[onclick*="projects"]'));
        } else {

        window.loadModule('dashboard', document.querySelector('.nav-item.active'));
        }

    }, 500);
  }
}

init();
</script>


    <script type="module">
        import { apiGet, apiPost } from "/assets/js/api.js";
        window.GlobalNotif = {
            fetch: async () => {
                const res = await apiGet("/functions/api/notifications");
                if(res.ok && res.data) {
                    const badge = document.getElementById("notif-badge");
                    if(res.data.unread_count > 0) badge.classList.remove("hidden");
                    else badge.classList.add("hidden");

                    const list = document.getElementById("notif-list");
                    if(res.data.items.length === 0) {
                        list.innerHTML = '<div class="text-center py-8 text-gray-400 text-xs font-bold">Belum ada notifikasi.</div>';
                        return;
                    }
                    list.innerHTML = res.data.items.map(n => `
                        <div class="p-3 rounded-xl ${n.is_read ? 'bg-white opacity-60' : 'bg-blue-50/50 border border-blue-100'} mb-1 hover:bg-gray-50 transition-colors cursor-pointer">
                            <h4 class="text-xs font-black text-gray-800 mb-0.5">${n.title}</h4>
                            <p class="text-[10px] text-gray-500 leading-tight">${n.message}</p>
                            <p class="text-[8px] text-gray-400 mt-1 uppercase font-bold">${new Date(n.created_at * 1000).toLocaleDateString('id-ID', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    `).join("");
                }
            },
            markRead: async () => {
                await apiPost("/functions/api/notifications");
                document.getElementById("notif-badge").classList.add("hidden");
                window.GlobalNotif.fetch();
            }
        };
        // Auto-check notif saat web dimuat
        setTimeout(() => window.GlobalNotif.fetch(), 2000);
        // Tutup panel jika klik di luar
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('notif-panel');
            if(!e.target.closest('.relative.mr-4') && !panel.classList.contains('hidden')) {
                panel.classList.add('hidden');
            }
        });
    </script>
