<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Portal - Orland Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#6b8aed' }, fontFamily: { sans: ['Poppins', 'sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="global-loader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary mb-4"></i>
        <p class="text-xs font-bold text-gray-400 uppercase tracking-widest animate-pulse">Memuat Antarmuka...</p>
    </div>

    <div id="app-shell" class="flex min-h-screen hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="p-6 font-black text-xl text-primary italic">ORLAND MGMT</div>
            <nav class="px-4 space-y-2">
                <a href="javascript:void(0)" onclick="loadModule('dashboard', this)" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 font-bold transition-all">
                    <i class="fa-solid fa-house"></i> Beranda
                </a>
                <a href="javascript:void(0)" onclick="loadModule('profile', this)" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-100 font-bold transition-all">
                    <i class="fa-solid fa-user"></i> Profil
                </a>
                <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-red-500 hover:bg-red-50 rounded-xl font-bold mt-10">
                    <i class="fa-solid fa-power-off"></i> Keluar
                </button>
            </nav>
        </aside>

        <div class="flex-1 lg:ml-64 flex flex-col">
            <header class="bg-white border-b p-4 flex items-center justify-between lg:hidden sticky top-0 z-40">
                <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="text-gray-600"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
                <span class="font-black text-primary">TALENT</span>
                <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
            </header>
            <main id="main-content" class="p-4 md:p-8"></main>
        </div>
    </div>

    <script type="module">
        import { checkSession, logout } from "./assets/js/session_manager.js";
        import { loadModule } from "./assets/js/ui.js";
        import config from "./assets/js/config.js";

        window.loadModule = loadModule;
        window.logout = logout;

        async function init() {
            try {
                const user = await checkSession();
                if (user && user.role === 'talent') {
                    document.getElementById('global-loader').classList.add('hidden');
                    document.getElementById('app-shell').classList.remove('hidden');
                    loadModule('dashboard'); 
                } else {
                    window.location.href = `${config.SSO_URL}/?redirect=talent`;
                }
            } catch (e) {
                console.error(e);
                alert("Sesi bermasalah. Mengalihkan ke Login...");
                window.location.href = `${config.SSO_URL}/?redirect=talent`;
            }
        }
        init();
    </script>
</body>
</html>
