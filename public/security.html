<!DOCTYPE html>
<html lang="en" class="theme-light group-talent">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Talent Security • Orland Management</title>
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <link rel="stylesheet" href="/assets/css/theme_global.css">
  <link rel="stylesheet" href="/assets/css/theme_light.css">
  <link rel="stylesheet" href="/assets/css/group_talent.css">
  <link rel="stylesheet" href="/assets/css/talent_portal.css">
</head>
<body class="theme-light group-talent">
  <div class="talent-shell">
    <aside class="talent-sidebar">
      <div class="talent-brand">Talent Portal</div>
      <nav class="talent-nav">
        <a href="/">Dashboard</a>
        <a href="/profile.html">My Profile</a>
        <a class="active" href="/security.html">Security</a>
        <a href="https://sso.orlandmanagement.com/">Logout</a>
      </nav>
    </aside>

    <main class="talent-main">
      <div class="talent-title">Security</div>
      <div class="talent-subtitle">Manage your active sessions and review current security status.</div>

      <section class="talent-section">
        <div class="talent-section-head">PHONE VERIFICATION</div>
        <div class="talent-section-body">
          <div id="phoneVerificationBox" class="talent-item">
            <div class="talent-item-title">Checking verification status...</div>
            <div class="talent-item-meta">Please wait.</div>
          </div>
        </div>
      </section>

      <section class="talent-section">
        <div class="talent-section-head">ACTIVE SESSIONS</div>
        <div class="talent-section-body">
          <div id="sessionList" class="talent-list">
            <div class="talent-item">
              <div class="talent-item-title">Loading sessions...</div>
              <div class="talent-item-meta">Please wait while we fetch your active devices.</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/app/modules/talent/mod_talent_security.js"></script>
</body>
</html>
