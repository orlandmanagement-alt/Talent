<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Talent Profile</title>
</head>
<body>
  <script type="module">
    import { mountTalentShell } from "./assets/js/talent_shell.js";
    import mod from "./modules/mod_talent_profile.js";

    mountTalentShell("Profile", `
      <div style="margin-top:16px;">
        <div id="profileInfo">Loading profile...</div>
      </div>

      <div style="margin-top:16px;">
        <h2>Core Identity</h2>
        <ul>
          <li>Display Name: <strong id="pfDisplayName">-</strong></li>
          <li>Slug: <strong id="pfSlug">-</strong></li>
          <li>Gender: <strong id="pfGender">-</strong></li>
          <li>Date of Birth: <strong id="pfDob">-</strong></li>
          <li>Location: <strong id="pfLocation">-</strong></li>
        </ul>
      </div>

      <div style="margin-top:16px;">
        <h2>Contact Public</h2>
        <ul>
          <li>Email: <strong id="pfEmail">-</strong></li>
          <li>Phone: <strong id="pfPhone">-</strong></li>
          <li>Website: <strong id="pfWebsite">-</strong></li>
          <li>Visibility: <strong id="pfContactVisibility">-</strong></li>
        </ul>
      </div>

      <div style="margin-top:16px;">
        <h2>Interests</h2>
        <ul id="interestList"></ul>
      </div>

      <div style="margin-top:16px;">
        <h2>Skills</h2>
        <ul id="skillList"></ul>
      </div>

      <div style="margin-top:16px;">
        <h2>Progress</h2>
        <ul>
          <li>Completion: <strong id="pfCompletion">-</strong></li>
          <li>Visibility Status: <strong id="pfVisibilityStatus">-</strong></li>
          <li>Visibility Reason: <strong id="pfVisibilityReason">-</strong></li>
          <li>Phone Verified: <strong id="pfPhoneVerified">-</strong></li>
        </ul>
      </div>
    `);

    mod();
  </script>
</body>
</html>
