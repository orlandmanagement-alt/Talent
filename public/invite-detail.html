<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Invite Detail</title>
</head>
<body>
  <script type="module">
    import { mountTalentShell } from "./assets/js/talent_shell.js";
    import mod from "./modules/mod_talent_invite_detail.js";

    mountTalentShell("Invite Detail", `
      <div style="margin-top:16px;">
        <div id="talentInviteDetailInfo">Loading invite detail...</div>
      </div>

      <ul>
        <li>ID: <strong id="idId">-</strong></li>
        <li>Project: <strong id="idProject">-</strong></li>
        <li>Role: <strong id="idRole">-</strong></li>
        <li>Status: <strong id="idStatus">-</strong></li>
        <li>Message: <strong id="idMessage">-</strong></li>
        <li>Response: <strong id="idResponse">-</strong></li>
      </ul>
    `);

    mod();
  </script>
</body>
</html>
