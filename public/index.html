<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Portal</title>
  <link rel="stylesheet" href="/assets/css/base.css">
</head>
<body>

<div id="app">
  <div id="loading">Loading...</div>
</div>

<script type="module">
import { checkSession, redirectToSSO, redirectToRegister } from "/assets/js/auth_guard.js";

const portal = location.hostname.includes("client") ? "client" : "talent";

async function init() {
  const user = await checkSession();

  if (user) {
    // ✅ sudah login → masuk dashboard SPA
    window.location.href = "/dashboard.html";
    return;
  }

  // ❌ belum login → tampil landing
  document.getElementById("app").innerHTML = `
    <div style="text-align:center;margin-top:100px">
      <h1>${portal.toUpperCase()} PORTAL</h1>
      <p>Welcome to Orland Management</p>

      <button onclick="login()">Login</button>
      <button onclick="register()">Register</button>
    </div>
  `;
}

window.login = () => redirectToSSO(portal, "/");
window.register = () => redirectToRegister(portal);

init();
</script>

</body>
</html>
