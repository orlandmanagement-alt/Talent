<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Portal - Orland Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#6b8aed' }, fontFamily: { sans: ['Poppins', 'sans-serif'] } } } }</script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border border-gray-100">
        <div class="w-20 h-20 bg-blue-50 text-primary rounded-2xl flex items-center justify-center text-4xl mx-auto mb-6">
            <i class="fa-solid fa-star"></i>
        </div>
        <h1 class="text-2xl font-black text-gray-800 tracking-tight mb-2">TALENT PORTAL</h1>
        <p class="text-sm text-gray-500 mb-8">Platform eksklusif untuk model, aktor, dan kreator Orland Management.</p>
        
        <div id="auth-area">
            <div class="py-4"><i class="fa-solid fa-spinner fa-spin text-3xl text-primary"></i><p class="text-xs text-gray-400 mt-3 font-bold uppercase tracking-widest">Memeriksa Sesi...</p></div>
        </div>
        
        <p id="error-msg" class="text-xs text-red-500 font-bold mt-4 hidden"></p>
    </div>

    <script type="module">
        async function init() {
            const area = document.getElementById('auth-area');
            
            try {
                // Dynamic Import: Jika file gagal dimuat (404/Adblock), akan masuk ke catch()
                const { checkSession } = await import("./assets/js/session_manager.js");
                const { default: config } = await import("./assets/js/config.js");

                const err = sessionStorage.getItem('auth_error');
                if(err) {
                    document.getElementById('error-msg').textContent = err;
                    document.getElementById('error-msg').classList.remove('hidden');
                    sessionStorage.removeItem('auth_error');
                }

                const user = await checkSession();
                
                if (user) {
                    if(user.role === 'talent') {
                        area.innerHTML = `
                            <div class="bg-green-50 text-green-700 p-3 rounded-xl mb-4 text-sm font-bold border border-green-200"><i class="fa-solid fa-circle-check"></i> Sesi Ditemukan!</div>
                            <button onclick="window.location.href='/dashboard.html'" class="w-full bg-primary text-white font-bold py-3 rounded-xl shadow-lg hover:bg-blue-600 transition-all active:scale-95">Masuk ke Dashboard <i class="fa-solid fa-arrow-right ml-2"></i></button>
                            <button onclick="import('./assets/js/session_manager.js').then(m=>m.logout())" class="w-full mt-3 text-xs font-bold text-gray-400 hover:text-red-500">Bukan Anda? Logout</button>
                        `;
                    } else {
                        area.innerHTML = `
                            <div class="bg-red-50 text-red-600 p-3 rounded-xl mb-4 text-sm font-bold border border-red-200">Akses Ditolak. Anda login sebagai ${user.role.toUpperCase()}.</div>
                            <button onclick="import('./assets/js/session_manager.js').then(m=>m.logout())" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-black">Logout & Ganti Akun</button>
                        `;
                    }
                } else {
                    area.innerHTML = `
                        <button onclick="window.location.href='${config.SSO_URL}/?redirect=talent'" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-blue-600 transition-all active:scale-95">Masuk / Daftar via SSO</button>
                    `;
                }
            } catch (error) {
                // Menangkap kegagalan Javascript dan menampilkannya di layar
                area.innerHTML = `
                    <div class="bg-red-50 text-red-600 p-4 rounded-xl text-xs font-bold border border-red-200 mb-4 text-left">
                        <i class="fa-solid fa-triangle-exclamation mb-1 text-lg"></i><br>
                        Gagal memuat sistem keamanan.<br><span class="text-gray-500 font-normal">${error.message}</span>
                    </div>
                    <button onclick="window.location.reload()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-black">Coba Lagi</button>
                `;
            }
        }
        init();
    </script>
</body>
</html>
