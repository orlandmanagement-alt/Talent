<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Talent Project Discovery</title>
</head>
<body>
  <script type="module">
    import { mountTalentShell } from "./assets/js/talent_shell.js";
    import mod from "./modules/mod_talent_projects.js";

    mountTalentShell("Open Projects", `
      <div style="margin-top:16px;">
        <form id="talentProjectSearchForm">
          <input id="talentProjectSearchInput" type="text" placeholder="Search open project">
          <button type="submit">Search</button>
          <button type="button" id="talentProjectReloadBtn">Reload</button>
        </form>
      </div>

      <div style="margin-top:16px;">
        <div id="talentProjectInfo">Loading projects...</div>
        <ul id="talentProjectList"></ul>
      </div>
    `);

    mod();
  </script>
</body>
</html>
